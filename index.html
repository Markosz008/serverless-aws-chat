<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serverless AWS Chat</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; margin: 0; height: 100vh; box-sizing: border-box; }
        #app-container { width: 100%; max-width: 500px; background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; height: 100%; position: relative; }
        
        /* Belépő képernyő */
        #login-screen { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        #login-screen h2 { color: #232f3e; margin-bottom: 20px; }
        #username-input { padding: 12px; border: 1px solid #ccc; border-radius: 5px; width: 80%; margin-bottom: 15px; font-size: 16px; text-align: center; }
        #join-btn { background: #ff9900; color: white; border: none; padding: 12px 30px; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 16px; }
        
        /* Chat képernyő */
        #header { background: #232f3e; color: white; padding: 15px; text-align: center; font-weight: bold; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        /* Üzenet buborékok */
        .message { padding: 10px 15px; border-radius: 15px; max-width: 75%; word-wrap: break-word; }
        .message.system { background: transparent; color: #888; font-size: 0.85em; text-align: center; align-self: center; margin: 10px 0; }
        
        /* Saját üzenetem (Jobbra) - Marad Narancs */
        .message.mine { background: #ff9900; color: white; align-self: flex-end; border-bottom-right-radius: 3px; }
        .message.mine .sender-name { display: none; /* Saját névnél nem kell kiírni a nevet */ }
        
        /* Mások üzenete (Balra) - WhatsApp Zöld */
        .message.others { background: #dcf8c6; color: black; align-self: flex-start; border-bottom-left-radius: 3px; }
        .message.others .sender-name { font-size: 0.75em; font-weight: bold; color: #075e54; margin-bottom: 4px; display: block; }
        
        #input-area { display: flex; padding: 15px; background: #fff; border-top: 1px solid #ddd; }
        #message-input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 20px; outline: none; }
        #send-btn { background: #ff9900; color: white; border: none; padding: 10px 20px; margin-left: 10px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="app-container">
    <!-- Belépő felület -->
    <div id="login-screen">
        <h2>AWS Serverless Chat 🟢</h2>
        <input type="text" id="username-input" placeholder="Add meg a beceneved...">
        <button id="join-btn">Csatlakozás a szobához</button>
    </div>

    <!-- Chat felület -->
    <div id="header">AWS Serverless Chat 🟢</div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="message-input" placeholder="Írj egy üzenetet..." disabled>
        <button id="send-btn" disabled>Küldés</button>
    </div>
</div>

<script>
    // Engedély kérése a böngészős értesítésekhez
    if ("Notification" in window) {
        if (Notification.permission !== "granted" && Notification.permission !== "denied") {
            Notification.requestPermission();
        }
    }

    // ⚠️ IDE ÍRD BE A TE ZÖLD WSS LINKEDET (pl. wss://xyz.execute-api...)! ⚠️
    const WSS_URL = 'wss://gpew571no8.execute-api.eu-central-1.amazonaws.com/production';

    let myUsername = "";
    let socket;

    const loginScreen = document.getElementById('login-screen');
    const usernameInput = document.getElementById('username-input');
    const joinBtn = document.getElementById('join-btn');
    const messagesDiv = document.getElementById('messages');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');

    // Csatlakozás gomb megnyomása
    joinBtn.addEventListener('click', () => {
        myUsername = usernameInput.value.trim() || "Anonim_" + Math.floor(Math.random() * 1000);
        loginScreen.style.display = 'none'; // Eltüntetjük a belépő képernyőt
        connectToChat();
    });

    function connectToChat() {
        addMessage('Csatlakozás a felhőhöz...', true);
        socket = new WebSocket(WSS_URL);

        socket.onopen = () => {
            addMessage(`Sikeresen csatlakoztál, ${myUsername}!`, true);
            messageInput.disabled = false;
            sendBtn.disabled = false;
            messageInput.focus();
        };

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.message && data.sender) {
                // Eldöntjük, hogy ez a saját üzenetünk-e
                const isMine = (data.sender === myUsername);
                addMessage(data.message, false, data.sender, isMine);

                // ÉRTESÍTÉS LOGIKA: Ha nem a mi üzenetünk, és az ablak nincs fókuszban
                if (!isMine && "Notification" in window && Notification.permission === "granted" && document.hidden) {
                    new Notification(`Új üzenet tőle: ${data.sender}`, {
                        body: data.message,
                        icon: "https://cdn-icons-png.flaticon.com/512/1041/1041916.png" // Kis chat ikon
                    });
                }
            }
        };

        socket.onclose = () => {
            addMessage('Kapcsolat megszakadt.', true);
            messageInput.disabled = true;
            sendBtn.disabled = true;
        };
    }

    function addMessage(text, isSystem = false, sender = '', isMine = false) {
        const msgDiv = document.createElement('div');
        
        if (isSystem) {
            msgDiv.className = 'message system';
        } else {
            msgDiv.className = 'message ' + (isMine ? 'mine' : 'others');
            if (sender && !isMine) {
                const senderSpan = document.createElement('span');
                senderSpan.className = 'sender-name';
                senderSpan.textContent = sender;
                msgDiv.appendChild(senderSpan);
            }
        }
        
        const textNode = document.createTextNode(text);
        msgDiv.appendChild(textNode);
        messagesDiv.appendChild(msgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function sendMessage() {
        const text = messageInput.value.trim();
        if (text && socket.readyState === WebSocket.OPEN) {
            const payload = {
                action: 'sendMessage',
                message: text,
                username: myUsername // Elküldjük a nevet is a Lambdának!
            };
            socket.send(JSON.stringify(payload));
            messageInput.value = '';
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>

</body>
</html>
